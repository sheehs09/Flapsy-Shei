<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLAPSY-SHEI</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f97316" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FLAPSY-SHEI" />
  <style>
    :root {
      --sky: #1a1a2e;
      --sky2: #16213e;
      --bird: #f5d020;
      --pipe: #4ade80;
      --pipe-dark: #22c55e;
      --ground: #854d0e;
      --ground-top: #a16207;
      --accent: #f97316;
      --white: #f8fafc;
      --red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    #game-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #title {
      color: var(--bird);
      font-size: 1.4rem;
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-shadow: 3px 3px 0 var(--accent), 6px 6px 0 #7c2d12;
      animation: titleFloat 2s ease-in-out infinite;
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    canvas {
      display: block;
      border: 3px solid var(--accent);
      box-shadow:
        0 0 0 3px #7c2d12,
        0 0 40px rgba(249,115,22,0.4),
        inset 0 0 80px rgba(0,0,0,0.3);
      image-rendering: pixelated;
      cursor: pointer;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      padding: 10px 4px 6px;
      color: var(--white);
      font-size: 0.55rem;
    }

    #hud span { color: var(--bird); }

    #overlay {
      position: absolute;
      top: 42px; /* below title */
      left: 0;
      width: 100%;
      height: calc(100% - 42px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
    }

    .overlay-box {
      background: rgba(10,10,25,0.88);
      border: 2px solid var(--accent);
      box-shadow: 0 0 20px rgba(249,115,22,0.3);
      padding: 22px 30px;
      text-align: center;
      max-width: 260px;
    }

    .overlay-box h2 {
      color: var(--bird);
      font-size: 0.9rem;
      margin-bottom: 12px;
      text-shadow: 2px 2px 0 var(--accent);
    }

    .overlay-box p {
      color: var(--white);
      font-size: 0.45rem;
      line-height: 2;
      margin-bottom: 8px;
    }

    .overlay-box .score-line {
      color: var(--accent);
      font-size: 0.65rem;
      margin: 4px 0;
    }

    .blink {
      animation: blink 1s step-end infinite;
      color: var(--pipe) !important;
      font-size: 0.5rem !important;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #medal {
      font-size: 2rem;
      margin-bottom: 4px;
    }

    /* Stars background */
    #stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.4); }
    }

    @media (max-width: 400px) {
      #title { font-size: 1rem; }
      canvas { border-width: 2px; }
    }
  </style>
</head>
<body>

<div id="stars"></div>

<div id="game-wrapper">
  <div id="title">🐦 FLAPSY-SHEI</div>
  <canvas id="canvas" width="320" height="480"></canvas>
  <div id="hud">
    <div>SCORE: <span id="score-display">0</span></div>
    <div>BEST: <span id="best-display">0</span></div>
  </div>

  <div id="overlay">
    <div class="overlay-box" id="start-screen">
      <h2>FLAPSY-SHEI</h2>
      <p>Navigate through the pipes<br>without crashing!</p>
      <p class="blink">[ CLICK / TAP / SPACE ]</p>
    </div>

    <div class="overlay-box" id="death-screen" style="display:none">
      <div id="medal"></div>
      <h2>GAME OVER</h2>
      <p class="score-line">SCORE: <span id="final-score">0</span></p>
      <p class="score-line">BEST:&nbsp; <span id="final-best">0</span></p>
      <p class="blink" style="margin-top:8px">[ CLICK / TAP / SPACE ]</p>
    </div>
  </div>
</div>

<script>
  // ── Stars ──────────────────────────────────────────────────
  (function() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2 + 1;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --d:${(Math.random()*3+1).toFixed(1)}s;
        animation-delay:${(Math.random()*3).toFixed(1)}s;
      `;
      container.appendChild(s);
    }
  })();

  // ── Game ───────────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const GROUND_H = 60;
  const PIPE_W = 52;
  const PIPE_GAP = 130;
  const GRAVITY = 0.38;
  const JUMP = -7.2;
  const PIPE_SPEED = 2.4;
  const PIPE_INTERVAL = 1500; // ms

  let state = 'start'; // start | playing | dead
  let score = 0, best = parseInt(localStorage.getItem('flapsy_shei_best') || '0');
  let bird, pipes, lastPipeTime, bgX, groundX, animFrame;

  const scoreEl = document.getElementById('score-display');
  const bestEl  = document.getElementById('best-display');
  const startScreen = document.getElementById('start-screen');
  const deathScreen = document.getElementById('death-screen');
  const finalScore  = document.getElementById('final-score');
  const finalBest   = document.getElementById('final-best');
  const medalEl     = document.getElementById('medal');

  bestEl.textContent = best;

  function initBird() {
    return {
      x: 80, y: H / 2 - 30,
      vy: 0,
      w: 34, h: 24,
      angle: 0,
      flapFrame: 0,
      flapTimer: 0,
      wingState: 0, // 0=mid, 1=up, 2=down
    };
  }

  function reset() {
    bird = initBird();
    pipes = [];
    lastPipeTime = 0;
    bgX = 0;
    groundX = 0;
    score = 0;
    scoreEl.textContent = 0;
  }

  // ── Drawing helpers ────────────────────────────────────────

  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
    grad.addColorStop(0, '#0f0c29');
    grad.addColorStop(0.5, '#1a1a4e');
    grad.addColorStop(1, '#302b63');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H - GROUND_H);
  }

  function drawStarsBG() {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    // Static star positions (seeded visually)
    const stars = [
      [20,30],[60,15],[110,50],[170,20],[220,40],[280,10],[300,55],
      [50,80],[140,70],[200,90],[250,65],[30,120],[90,100],[160,110],
      [230,130],[295,95],[10,160],[80,150],[190,140],[270,170]
    ];
    stars.forEach(([x,y]) => {
      ctx.fillRect(x + bgX * 0.05 % W, y, 2, 2);
    });
  }

  function drawMoon() {
    ctx.save();
    ctx.fillStyle = '#fef9c3';
    ctx.shadowColor = '#fef08a';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(W - 60, 50, 22, 0, Math.PI * 2);
    ctx.fill();
    // Crater
    ctx.fillStyle = '#fef08a';
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(W - 52, 44, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(W - 68, 56, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawGround() {
    // Ground body
    const grad = ctx.createLinearGradient(0, H - GROUND_H, 0, H);
    grad.addColorStop(0, '#a16207');
    grad.addColorStop(0.2, '#854d0e');
    grad.addColorStop(1, '#431407');
    ctx.fillStyle = grad;
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);

    // Grass stripe
    ctx.fillStyle = '#4d7c0f';
    ctx.fillRect(0, H - GROUND_H, W, 8);
    ctx.fillStyle = '#65a30d';
    ctx.fillRect(0, H - GROUND_H, W, 4);

    // Ground texture dashes
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    for (let x = (groundX % 32) - 32; x < W; x += 32) {
      ctx.fillRect(x, H - GROUND_H + 14, 20, 4);
    }
  }

  function drawPipe(pipe) {
    const capH = 20, capW = PIPE_W + 8;

    // Top pipe
    const topGrad = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_W, 0);
    topGrad.addColorStop(0, '#166534');
    topGrad.addColorStop(0.3, '#4ade80');
    topGrad.addColorStop(0.7, '#22c55e');
    topGrad.addColorStop(1, '#14532d');
    ctx.fillStyle = topGrad;
    ctx.fillRect(pipe.x, 0, PIPE_W, pipe.top);
    // Top cap
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(pipe.x - 4, pipe.top - capH, capW, capH);
    ctx.fillStyle = '#166534';
    ctx.fillRect(pipe.x - 4, pipe.top - capH, capW, 3);

    // Bottom pipe
    const botY = pipe.top + PIPE_GAP;
    ctx.fillStyle = topGrad;
    ctx.fillRect(pipe.x, botY, PIPE_W, H - GROUND_H - botY);
    // Bottom cap
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(pipe.x - 4, botY, capW, capH);
    ctx.fillStyle = '#166534';
    ctx.fillRect(pipe.x - 4, botY + capH - 3, capW, 3);

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(pipe.x + 6, 0, 6, pipe.top);
    ctx.fillRect(pipe.x + 6, botY, 6, H - GROUND_H - botY);
  }

  function drawBird(b) {
    ctx.save();
    ctx.translate(b.x + b.w / 2, b.y + b.h / 2);
    ctx.rotate(b.angle);

    // Body
    ctx.fillStyle = '#f5d020';
    ctx.shadowColor = '#f5d020';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(0, 0, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Belly
    ctx.fillStyle = '#fef08a';
    ctx.beginPath();
    ctx.ellipse(4, 3, b.w / 3.5, b.h / 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing
    const wingY = b.wingState === 1 ? -8 : b.wingState === 2 ? 8 : -2;
    ctx.fillStyle = '#eab308';
    ctx.beginPath();
    ctx.ellipse(-4, wingY, 10, 6, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(9, -4, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1e1b4b';
    ctx.beginPath(); ctx.arc(10, -4, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(11, -5, 1, 0, Math.PI * 2); ctx.fill();

    // Beak
    ctx.fillStyle = '#f97316';
    ctx.beginPath();
    ctx.moveTo(14, -1);
    ctx.lineTo(22, 2);
    ctx.lineTo(14, 5);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawScore() {
    ctx.fillStyle = 'white';
    ctx.font = '18px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.fillText(score, W / 2, 42);
    ctx.shadowBlur = 0;
  }

  function drawIdleHint() {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '8px "Press Start 2P"';
    ctx.textAlign = 'center';
    // Bouncing arrow
    const bounce = Math.sin(Date.now() / 300) * 4;
    ctx.fillText('▼ TAP TO FLAP ▼', W / 2, H / 2 + 60 + bounce);
  }

  // ── Particle system ────────────────────────────────────────
  let particles = [];

  function spawnParticles(x, y) {
    for (let i = 0; i < 12; i++) {
      const angle = (Math.PI * 2 * i) / 12;
      particles.push({
        x, y,
        vx: Math.cos(angle) * (Math.random() * 4 + 1),
        vy: Math.sin(angle) * (Math.random() * 4 + 1),
        life: 1,
        color: ['#f5d020','#f97316','#4ade80','white'][Math.floor(Math.random()*4)],
        size: Math.random() * 5 + 2
      });
    }
  }

  function updateParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.15;
      p.life -= 0.03;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
      ctx.globalAlpha = 1;
    });
  }

  // ── Collision ──────────────────────────────────────────────
  function checkCollision() {
    const bx = bird.x + 6, by = bird.y + 4;
    const bw = bird.w - 10, bh = bird.h - 8;

    // Ground / ceiling
    if (bird.y + bird.h >= H - GROUND_H || bird.y < 0) return true;

    for (const p of pipes) {
      if (bx + bw > p.x + 4 && bx < p.x + PIPE_W - 4) {
        if (by < p.top || by + bh > p.top + PIPE_GAP) return true;
      }
    }
    return false;
  }

  // ── Main loop ──────────────────────────────────────────────
  let lastTime = 0;

  function loop(ts) {
    const dt = ts - lastTime;
    lastTime = ts;

    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawStarsBG();
    drawMoon();

    if (state === 'playing') {
      // Move bg & ground
      bgX -= 0.4;
      groundX -= PIPE_SPEED;

      // Spawn pipes
      if (ts - lastPipeTime > PIPE_INTERVAL) {
        const minTop = 60, maxTop = H - GROUND_H - PIPE_GAP - 60;
        pipes.push({ x: W + 10, top: Math.random() * (maxTop - minTop) + minTop, passed: false });
        lastPipeTime = ts;
      }

      // Update pipes
      pipes.forEach(p => {
        p.x -= PIPE_SPEED;
        if (!p.passed && p.x + PIPE_W < bird.x) {
          p.passed = true;
          score++;
          scoreEl.textContent = score;
          if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('flapsy_shei_best', best); }
        }
      });
      pipes = pipes.filter(p => p.x + PIPE_W > -20);

      // Update bird
      bird.vy += GRAVITY;
      bird.y += bird.vy;
      bird.angle = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.vy * 0.07));

      // Wing flap
      bird.flapTimer++;
      if (bird.flapTimer % 8 === 0) bird.wingState = (bird.wingState + 1) % 3;

      if (checkCollision()) {
        spawnParticles(bird.x + bird.w / 2, bird.y + bird.h / 2);
        state = 'dead';
        deathScreen.style.display = '';
        startScreen.style.display = 'none';
        finalScore.textContent = score;
        finalBest.textContent = best;
        medalEl.textContent = score >= 40 ? '🏆' : score >= 20 ? '🥇' : score >= 10 ? '🥈' : score >= 5 ? '🥉' : '💀';
        if (score > best) best = score;
      }
    }

    // Draw pipes
    pipes.forEach(drawPipe);

    drawGround();
    updateParticles();
    drawBird(bird);

    if (state === 'playing') drawScore();
    if (state === 'start') drawIdleHint();

    // Idle bob
    if (state === 'start') {
      bird.y = H / 2 - 30 + Math.sin(ts / 400) * 8;
      bird.angle = Math.sin(ts / 400) * 0.15;
      bird.flapTimer++;
      if (bird.flapTimer % 10 === 0) bird.wingState = (bird.wingState + 1) % 3;
    }

    animFrame = requestAnimationFrame(loop);
  }

  function flap() {
    if (state === 'start') {
      state = 'playing';
      startScreen.style.display = 'none';
      deathScreen.style.display = 'none';
      lastPipeTime = performance.now() + 800; // grace period
      bird.vy = JUMP;
      return;
    }
    if (state === 'dead') {
      reset();
      state = 'playing';
      deathScreen.style.display = 'none';
      lastPipeTime = performance.now() + 800;
      bird.vy = JUMP;
      return;
    }
    if (state === 'playing') {
      bird.vy = JUMP;
      bird.wingState = 1;
    }
  }

  // ── Input ──────────────────────────────────────────────────
  canvas.addEventListener('click', flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
  document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); } });

  // ── Boot ───────────────────────────────────────────────────
  reset();
  requestAnimationFrame(loop);
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("FLAPSY-SHEI: Service Worker registered ✅"))
        .catch(err => console.warn("SW registration failed:", err));
    });
  }
</script>
</body>
</html>
