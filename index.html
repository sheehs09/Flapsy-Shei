<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLAPSY-SHEI v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f97316" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FLAPSY-SHEI" />
  <style>
    :root { --accent:#f97316; --bird:#f5d020; --pipe:#4ade80; --white:#f8fafc; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0a0a14;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; font-family:'Press Start 2P',monospace; overflow:hidden;
    }
    #game-wrapper { position:relative; display:flex; flex-direction:column; align-items:center; }
    #title {
      color:var(--bird); font-size:1.1rem; letter-spacing:2px; margin-bottom:8px;
      text-shadow:3px 3px 0 var(--accent),6px 6px 0 #7c2d12;
      animation:titleFloat 2s ease-in-out infinite;
    }
    @keyframes titleFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    canvas {
      display:block; border:3px solid var(--accent);
      box-shadow:0 0 0 3px #7c2d12,0 0 40px rgba(249,115,22,.4);
      image-rendering:pixelated; cursor:pointer;
    }
    #hud {
      display:flex; justify-content:space-between; align-items:center;
      width:100%; padding:6px 4px 4px; color:var(--white); font-size:.5rem;
    }
    #hud span { color:var(--bird); }
    #mute-btn {
      background:none; border:1px solid var(--accent); color:var(--accent);
      font-family:inherit; font-size:.4rem; padding:3px 6px; cursor:pointer;
    }
    #mute-btn:hover { background:rgba(249,115,22,.2); }
    #overlay {
      position:absolute; top:38px; left:0; width:100%; height:calc(100% - 38px);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:10px; pointer-events:none;
    }
    .overlay-box {
      background:rgba(8,8,20,.92); border:2px solid var(--accent);
      box-shadow:0 0 20px rgba(249,115,22,.3); padding:16px 20px;
      text-align:center; width:270px; pointer-events:all;
    }
    .overlay-box h2 {
      color:var(--bird); font-size:.8rem; margin-bottom:10px;
      text-shadow:2px 2px 0 var(--accent);
    }
    .overlay-box p { color:var(--white); font-size:.4rem; line-height:2; }
    .score-line { color:var(--accent); font-size:.6rem; margin:3px 0; }
    .blink { animation:blink 1s step-end infinite; color:var(--pipe)!important; font-size:.45rem!important; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    #medal { font-size:1.8rem; margin-bottom:4px; }
    .tabs { display:flex; gap:4px; margin-bottom:10px; }
    .tab-btn {
      flex:1; background:rgba(249,115,22,.1); border:1px solid var(--accent);
      color:var(--white); font-family:inherit; font-size:.32rem; padding:5px 2px; cursor:pointer;
    }
    .tab-btn.active { background:var(--accent); color:#000; }
    .skin-grid { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:8px 0; }
    .skin-opt {
      width:44px; height:44px; border:2px solid #444;
      background:rgba(255,255,255,.05); cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:1.4rem;
    }
    .skin-opt.selected { border-color:var(--accent); box-shadow:0 0 8px var(--accent); }
    .diff-btns { display:flex; flex-direction:column; gap:6px; margin:8px 0; }
    .diff-btn {
      background:rgba(255,255,255,.05); border:1px solid #555; color:var(--white);
      font-family:inherit; font-size:.35rem; padding:7px 10px; cursor:pointer; text-align:left;
    }
    .diff-btn.selected { border-color:var(--accent); background:rgba(249,115,22,.15); }
    .diff-btn span { color:#aaa; font-size:.28rem; display:block; margin-top:3px; }
    .theme-grid { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin:8px 0; }
    .theme-opt {
      width:50px; height:36px; border:2px solid #444; cursor:pointer;
      font-size:.28rem; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:2px; color:white;
    }
    .theme-opt.selected { border-color:var(--accent); box-shadow:0 0 8px var(--accent); }
    .lb-list { list-style:none; width:100%; margin-top:6px; }
    .lb-list li {
      display:flex; justify-content:space-between; font-size:.35rem;
      padding:4px 0; border-bottom:1px solid rgba(255,255,255,.08); color:var(--white);
    }
    .lb-list li:first-child { color:var(--bird); }
    .lb-list li .rank { color:#888; width:16px; }
    #stars { position:fixed; top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;overflow:hidden; }
    .star { position:absolute; background:white; border-radius:50%; animation:twinkle var(--d) ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:.1;transform:scale(1)} 50%{opacity:.9;transform:scale(1.4)} }
    @media(max-width:360px){ #title{font-size:.85rem} canvas{border-width:2px} }
  </style>
</head>
<body>
<div id="stars"></div>
<div id="game-wrapper">
  <div id="title">🐦 FLAPSY-SHEI</div>
  <canvas id="canvas" width="320" height="480"></canvas>
  <div id="hud">
    <div>SCORE: <span id="score-display">0</span></div>
    <div>BEST: <span id="best-display">0</span></div>
    <button id="mute-btn">🔊 SFX</button>
  </div>
  <div id="overlay">

    <!-- START SCREEN -->
    <div class="overlay-box" id="start-screen">
      <h2>FLAPSY-SHEI</h2>
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tab-play')">▶ PLAY</button>
        <button class="tab-btn" onclick="showTab('tab-skin')">🎨</button>
        <button class="tab-btn" onclick="showTab('tab-diff')">⚡</button>
        <button class="tab-btn" onclick="showTab('tab-theme')">🌈</button>
        <button class="tab-btn" onclick="showTab('tab-lb')">🏆</button>
      </div>
      <div id="tab-play">
        <p>Navigate through the pipes<br>without crashing!</p>
        <p class="blink" style="margin-top:10px">[ CLICK / TAP / SPACE ]</p>
      </div>
      <div id="tab-skin" style="display:none">
        <p style="margin-bottom:6px;font-size:.35rem">CHOOSE YOUR BIRD</p>
        <div class="skin-grid" id="skin-grid"></div>
      </div>
      <div id="tab-diff" style="display:none">
        <p style="margin-bottom:6px;font-size:.35rem">DIFFICULTY</p>
        <div class="diff-btns" id="diff-btns"></div>
      </div>
      <div id="tab-theme" style="display:none">
        <p style="margin-bottom:6px;font-size:.35rem">BACKGROUND THEME</p>
        <div class="theme-grid" id="theme-grid"></div>
      </div>
      <div id="tab-lb" style="display:none">
        <p style="margin-bottom:4px;font-size:.35rem">TOP SCORES</p>
        <ul class="lb-list" id="lb-list"></ul>
        <p style="margin-top:8px;color:#555;font-size:.28rem">Saved on this device</p>
      </div>
    </div>

    <!-- DEATH SCREEN -->
    <div class="overlay-box" id="death-screen" style="display:none">
      <div id="medal"></div>
      <h2>GAME OVER</h2>
      <p class="score-line">SCORE: <span id="final-score">0</span></p>
      <p class="score-line">BEST:&nbsp;&nbsp;<span id="final-best">0</span></p>
      <p id="new-best-msg" style="color:#4ade80;font-size:.38rem;margin:4px 0;display:none">✨ NEW BEST! ✨</p>
      <ul class="lb-list" id="death-lb" style="margin-top:8px"></ul>
      <p class="blink" style="margin-top:10px">[ CLICK / TAP / SPACE ]</p>
    </div>
  </div>
</div>

<script>
// ── Stars ──────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
    c.appendChild(s);
  }
})();

// ── Sound ──────────────────────────────────────────────────────
let audioCtx=null, muted=false;
function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playSound(type){
  if(muted) return;
  try{
    const ac=getAudio(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    if(type==='flap'){
      o.type='sine'; o.frequency.setValueAtTime(520,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(320,ac.currentTime+.08);
      g.gain.setValueAtTime(.18,ac.currentTime); g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.1);
      o.start(); o.stop(ac.currentTime+.1);
    } else if(type==='score'){
      o.type='square'; o.frequency.setValueAtTime(880,ac.currentTime);
      o.frequency.setValueAtTime(1100,ac.currentTime+.08);
      g.gain.setValueAtTime(.12,ac.currentTime); g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.2);
      o.start(); o.stop(ac.currentTime+.2);
    } else if(type==='die'){
      o.type='sawtooth'; o.frequency.setValueAtTime(400,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(80,ac.currentTime+.4);
      g.gain.setValueAtTime(.25,ac.currentTime); g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.4);
      o.start(); o.stop(ac.currentTime+.4);
    } else if(type==='hit'){
      o.type='square'; o.frequency.setValueAtTime(200,ac.currentTime);
      g.gain.setValueAtTime(.3,ac.currentTime); g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);
      o.start(); o.stop(ac.currentTime+.15);
    }
  }catch(e){}
}
document.getElementById('mute-btn').addEventListener('click',()=>{
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'🔇 SFX':'🔊 SFX';
});

// ── Skins ──────────────────────────────────────────────────────
const SKINS=[
  {id:'yellow',emoji:'🐤',label:'Classic', body:'#f5d020',belly:'#fef08a',wing:'#eab308',beak:'#f97316'},
  {id:'red',   emoji:'🔴',label:'Firey',  body:'#ef4444',belly:'#fca5a5',wing:'#dc2626',beak:'#f97316'},
  {id:'blue',  emoji:'🔵',label:'Icy',    body:'#3b82f6',belly:'#93c5fd',wing:'#2563eb',beak:'#60a5fa'},
  {id:'green', emoji:'🟢',label:'Toxic',  body:'#22c55e',belly:'#86efac',wing:'#16a34a',beak:'#f97316'},
  {id:'pink',  emoji:'🩷',label:'Bubbly', body:'#ec4899',belly:'#f9a8d4',wing:'#db2777',beak:'#f97316'},
  {id:'purple',emoji:'💜',label:'Galaxy', body:'#a855f7',belly:'#d8b4fe',wing:'#9333ea',beak:'#f97316'},
  {id:'white', emoji:'⬜',label:'Ghost',  body:'#f1f5f9',belly:'#ffffff',wing:'#cbd5e1',beak:'#f97316'},
  {id:'black', emoji:'⬛',label:'Shadow', body:'#1e293b',belly:'#334155',wing:'#0f172a',beak:'#f97316'},
];
let selectedSkin=localStorage.getItem('flapsy_skin')||'yellow';
function buildSkinGrid(){
  const grid=document.getElementById('skin-grid'); grid.innerHTML='';
  SKINS.forEach(sk=>{
    const d=document.createElement('div');
    d.className='skin-opt'+(sk.id===selectedSkin?' selected':'');
    d.title=sk.label; d.textContent=sk.emoji;
    d.onclick=()=>{
      selectedSkin=sk.id; localStorage.setItem('flapsy_skin',sk.id);
      document.querySelectorAll('.skin-opt').forEach(x=>x.classList.remove('selected'));
      d.classList.add('selected');
    };
    grid.appendChild(d);
  });
}
function getSkin(){ return SKINS.find(s=>s.id===selectedSkin)||SKINS[0]; }

// ── Difficulty ─────────────────────────────────────────────────
const DIFFICULTIES=[
  {id:'easy',  label:'😊 EASY',  desc:'Wide gap · Slow pipes · More time',  gap:155,speed:2.0,interval:1800,gravity:.32,jump:-6.8},
  {id:'normal',label:'😐 NORMAL',desc:'Classic Flapsy-Shei experience',      gap:130,speed:2.4,interval:1500,gravity:.38,jump:-7.2},
  {id:'hard',  label:'😤 HARD',  desc:'Narrow gap · Fast pipes · Less time', gap:108,speed:3.1,interval:1200,gravity:.44,jump:-7.6},
  {id:'insane',label:'💀 INSANE',desc:'For the brave. Good luck.',           gap:90, speed:3.8,interval:1000,gravity:.50,jump:-8.0},
];
let selectedDiff=localStorage.getItem('flapsy_diff')||'normal';
function buildDiffBtns(){
  const wrap=document.getElementById('diff-btns'); wrap.innerHTML='';
  DIFFICULTIES.forEach(d=>{
    const b=document.createElement('button');
    b.className='diff-btn'+(d.id===selectedDiff?' selected':'');
    b.innerHTML=`${d.label}<span>${d.desc}</span>`;
    b.onclick=()=>{
      selectedDiff=d.id; localStorage.setItem('flapsy_diff',d.id);
      document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
    };
    wrap.appendChild(b);
  });
}
function getDiff(){ return DIFFICULTIES.find(d=>d.id===selectedDiff)||DIFFICULTIES[1]; }

// ── Themes ─────────────────────────────────────────────────────
const THEMES=[
  {id:'night', label:'🌙 Night',  sky:['#0f0c29','#1a1a4e','#302b63'], ground:['#a16207','#854d0e','#431407'],grass:'#4d7c0f', pipe:['#166534','#4ade80','#22c55e','#14532d'],moon:true, moonColor:'#fef9c3',bg:'#0a0a14'},
  {id:'day',   label:'☀️ Day',   sky:['#38bdf8','#7dd3fc','#bae6fd'], ground:['#a16207','#854d0e','#431407'],grass:'#65a30d', pipe:['#166534','#4ade80','#22c55e','#14532d'],sun:true,  sunColor:'#fbbf24', bg:'#0369a1'},
  {id:'sunset',label:'🌅 Sunset', sky:['#7c2d12','#c2410c','#fb923c'], ground:['#713f12','#92400e','#451a03'],grass:'#854d0e', pipe:['#1e3a5f','#3b82f6','#2563eb','#1e40af'],sun:true,  sunColor:'#fde047', bg:'#431407'},
  {id:'space', label:'🚀 Space',  sky:['#000000','#0a0a2e','#0f0f3e'], ground:['#374151','#1f2937','#111827'],grass:'#374151', pipe:['#4338ca','#818cf8','#6366f1','#312e81'],moon:true, moonColor:'#e2e8f0',bg:'#000010'},
  {id:'candy', label:'🍭 Candy',  sky:['#fce7f3','#fbcfe8','#f9a8d4'], ground:['#be185d','#9d174d','#831843'],grass:'#ec4899', pipe:['#7e22ce','#c084fc','#a855f7','#581c87'],sun:true,  sunColor:'#f472b6', bg:'#831843'},
  {id:'forest',label:'🌲 Forest', sky:['#052e16','#14532d','#166534'], ground:['#713f12','#92400e','#78350f'],grass:'#15803d', pipe:['#92400e','#d97706','#b45309','#78350f'],moon:true, moonColor:'#d1fae5',bg:'#052e16'},
];
let selectedTheme=localStorage.getItem('flapsy_theme')||'night';
function buildThemeGrid(){
  const grid=document.getElementById('theme-grid'); grid.innerHTML='';
  THEMES.forEach(t=>{
    const d=document.createElement('div');
    d.className='theme-opt'+(t.id===selectedTheme?' selected':'');
    d.style.background=`linear-gradient(to bottom,${t.sky[0]},${t.sky[2]})`;
    d.style.borderColor=t.id===selectedTheme?'var(--accent)':'#444';
    const parts=t.label.split(' ');
    d.innerHTML=`<span style="font-size:1rem">${parts[0]}</span><span>${parts.slice(1).join(' ')}</span>`;
    d.onclick=()=>{
      selectedTheme=t.id; localStorage.setItem('flapsy_theme',t.id);
      document.querySelectorAll('.theme-opt').forEach(x=>{x.classList.remove('selected');x.style.borderColor='#444';});
      d.classList.add('selected'); d.style.borderColor='var(--accent)';
      document.body.style.background=t.bg;
    };
    grid.appendChild(d);
  });
  const cur=THEMES.find(t=>t.id===selectedTheme)||THEMES[0];
  document.body.style.background=cur.bg;
}
function getTheme(){ return THEMES.find(t=>t.id===selectedTheme)||THEMES[0]; }

// ── Leaderboard ────────────────────────────────────────────────
function getLeaderboard(){ try{ return JSON.parse(localStorage.getItem('flapsy_lb')||'[]'); }catch(e){ return []; } }
function saveScore(score,diff){
  const lb=getLeaderboard();
  lb.push({score,diff,date:new Date().toLocaleDateString()});
  lb.sort((a,b)=>b.score-a.score);
  const top=lb.slice(0,10);
  localStorage.setItem('flapsy_lb',JSON.stringify(top));
  return top;
}
function renderLeaderboard(elId){
  const lb=getLeaderboard(), el=document.getElementById(elId); el.innerHTML='';
  if(!lb.length){ el.innerHTML='<li style="color:#666;font-size:.32rem;justify-content:center">No scores yet!</li>'; return; }
  lb.slice(0,7).forEach((entry,i)=>{
    const li=document.createElement('li');
    const medals=['🥇','🥈','🥉'];
    li.innerHTML=`<span class="rank">${medals[i]||(('#'+(i+1)))}</span><span>${entry.score} pts</span><span style="color:#666">${entry.diff||'?'} · ${entry.date}</span>`;
    el.appendChild(li);
  });
}

// ── Tabs ───────────────────────────────────────────────────────
function showTab(tabId){
  ['tab-play','tab-skin','tab-diff','tab-theme','tab-lb'].forEach(id=>{
    document.getElementById(id).style.display=id===tabId?'':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',['tab-play','tab-skin','tab-diff','tab-theme','tab-lb'][i]===tabId);
  });
  if(tabId==='tab-lb') renderLeaderboard('lb-list');
}

// ── Game ───────────────────────────────────────────────────────
const canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d');
const W=canvas.width, H=canvas.height, GROUND_H=60, PIPE_W=52;

let state='start', score=0, best=parseInt(localStorage.getItem('flapsy_shei_best')||'0');
let bird, pipes, lastPipeTime, bgX, groundX;

const scoreEl=document.getElementById('score-display');
const bestEl=document.getElementById('best-display');
const startScreen=document.getElementById('start-screen');
const deathScreen=document.getElementById('death-screen');
const finalScoreEl=document.getElementById('final-score');
const finalBestEl=document.getElementById('final-best');
const medalEl=document.getElementById('medal');
const newBestMsg=document.getElementById('new-best-msg');
bestEl.textContent=best;

function initBird(){ return {x:80,y:H/2-30,vy:0,w:34,h:24,angle:0,flapTimer:0,wingState:0}; }
function reset(){ bird=initBird(); pipes=[]; lastPipeTime=0; bgX=0; groundX=0; score=0; scoreEl.textContent=0; }

const STAR_POS=[[20,30],[60,15],[110,50],[170,20],[220,40],[280,10],[300,55],[50,80],[140,70],[200,90],[250,65],[30,120],[90,100],[160,110],[230,130],[295,95],[10,160],[80,150],[190,140],[270,170]];

function drawSky(t){
  const g=ctx.createLinearGradient(0,0,0,H-GROUND_H);
  g.addColorStop(0,t.sky[0]); g.addColorStop(.5,t.sky[1]); g.addColorStop(1,t.sky[2]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H-GROUND_H);
}
function drawStarsBG(t){
  if(!['night','space','forest'].includes(t.id)) return;
  ctx.fillStyle=t.id==='space'?'rgba(255,255,255,.9)':'rgba(255,255,255,.6)';
  STAR_POS.forEach(([x,y])=>ctx.fillRect((x+bgX*.05)%W,y,2,2));
}
function drawCelestial(t){
  ctx.save();
  if(t.moon){
    ctx.fillStyle=t.moonColor; ctx.shadowColor=t.moonColor; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(W-60,50,22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=t.id==='space'?'#94a3b8':'#fef08a'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(W-52,44,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(W-68,56,3,0,Math.PI*2); ctx.fill();
  }
  if(t.sun){
    ctx.fillStyle=t.sunColor; ctx.shadowColor=t.sunColor; ctx.shadowBlur=30;
    ctx.beginPath(); ctx.arc(W-60,55,26,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.strokeStyle=t.sunColor; ctx.lineWidth=2; ctx.globalAlpha=.5;
    for(let i=0;i<8;i++){
      const a=(Math.PI*2*i/8)+(Date.now()/4000);
      ctx.beginPath(); ctx.moveTo(W-60+Math.cos(a)*30,55+Math.sin(a)*30);
      ctx.lineTo(W-60+Math.cos(a)*42,55+Math.sin(a)*42); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  ctx.restore();
}
function drawGround(t){
  const g=ctx.createLinearGradient(0,H-GROUND_H,0,H);
  g.addColorStop(0,t.ground[0]); g.addColorStop(.2,t.ground[1]); g.addColorStop(1,t.ground[2]);
  ctx.fillStyle=g; ctx.fillRect(0,H-GROUND_H,W,GROUND_H);
  ctx.fillStyle=t.grass; ctx.fillRect(0,H-GROUND_H,W,8);
  ctx.fillStyle='rgba(255,255,255,.15)'; ctx.fillRect(0,H-GROUND_H,W,3);
  ctx.fillStyle='rgba(0,0,0,.2)';
  for(let x=(groundX%32)-32;x<W;x+=32) ctx.fillRect(x,H-GROUND_H+14,20,4);
}
function drawPipe(pipe,t){
  const capH=20,capW=PIPE_W+8,[c1,c2,c3,c4]=t.pipe;
  const gr=ctx.createLinearGradient(pipe.x,0,pipe.x+PIPE_W,0);
  gr.addColorStop(0,c1); gr.addColorStop(.3,c2); gr.addColorStop(.7,c3); gr.addColorStop(1,c4);
  ctx.fillStyle=gr; ctx.fillRect(pipe.x,0,PIPE_W,pipe.top);
  ctx.fillStyle=c2; ctx.fillRect(pipe.x-4,pipe.top-capH,capW,capH);
  ctx.fillStyle=c1; ctx.fillRect(pipe.x-4,pipe.top-capH,capW,3);
  const botY=pipe.top+getDiff().gap;
  ctx.fillStyle=gr; ctx.fillRect(pipe.x,botY,PIPE_W,H-GROUND_H-botY);
  ctx.fillStyle=c2; ctx.fillRect(pipe.x-4,botY,capW,capH);
  ctx.fillStyle=c1; ctx.fillRect(pipe.x-4,botY+capH-3,capW,3);
  ctx.fillStyle='rgba(255,255,255,.12)';
  ctx.fillRect(pipe.x+6,0,6,pipe.top); ctx.fillRect(pipe.x+6,botY,6,H-GROUND_H-botY);
}
function drawBird(b){
  const sk=getSkin();
  ctx.save(); ctx.translate(b.x+b.w/2,b.y+b.h/2); ctx.rotate(b.angle);
  ctx.shadowColor=sk.body; ctx.shadowBlur=10; ctx.fillStyle=sk.body;
  ctx.beginPath(); ctx.ellipse(0,0,b.w/2,b.h/2,0,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle=sk.belly; ctx.beginPath(); ctx.ellipse(4,3,b.w/3.5,b.h/3,0,0,Math.PI*2); ctx.fill();
  const wingY=b.wingState===1?-8:b.wingState===2?8:-2;
  ctx.fillStyle=sk.wing; ctx.beginPath(); ctx.ellipse(-4,wingY,10,6,-.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(9,-4,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e1b4b'; ctx.beginPath(); ctx.arc(10,-4,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(11,-5,1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=sk.beak; ctx.beginPath(); ctx.moveTo(14,-1); ctx.lineTo(22,2); ctx.lineTo(14,5); ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawScore(){
  const diff=getDiff();
  ctx.fillStyle='white'; ctx.font='18px "Press Start 2P"'; ctx.textAlign='center';
  ctx.shadowColor='rgba(0,0,0,.6)'; ctx.shadowBlur=6; ctx.fillText(score,W/2,42); ctx.shadowBlur=0;
  ctx.font='6px "Press Start 2P"'; ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.fillText(diff.id.toUpperCase(),W/2,54);
}
function drawIdleHint(){
  ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='7px "Press Start 2P"'; ctx.textAlign='center';
  const bounce=Math.sin(Date.now()/300)*4;
  ctx.fillText('▼ TAP TO FLAP ▼',W/2,H/2+60+bounce);
}

let particles=[];
function spawnParticles(x,y){
  const sk=getSkin();
  for(let i=0;i<16;i++){
    const a=(Math.PI*2*i)/16;
    particles.push({x,y,vx:Math.cos(a)*(Math.random()*5+1),vy:Math.sin(a)*(Math.random()*5+1),life:1,
      color:[sk.body,sk.wing,'#f97316','white'][Math.floor(Math.random()*4)],size:Math.random()*5+2});
  }
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.life-=.03;
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size); ctx.globalAlpha=1;
  });
}
function checkCollision(){
  const bx=bird.x+6,by=bird.y+4,bw=bird.w-10,bh=bird.h-8;
  if(bird.y+bird.h>=H-GROUND_H||bird.y<0) return true;
  const gap=getDiff().gap;
  for(const p of pipes){
    if(bx+bw>p.x+4&&bx<p.x+PIPE_W-4){ if(by<p.top||by+bh>p.top+gap) return true; }
  }
  return false;
}

let lastTime=0;
function loop(ts){
  const theme=getTheme(), diff=getDiff();
  ctx.clearRect(0,0,W,H);
  drawSky(theme); drawStarsBG(theme); drawCelestial(theme);
  if(state==='playing'){
    bgX-=.4; groundX-=diff.speed;
    if(ts-lastPipeTime>diff.interval){
      const minTop=60,maxTop=H-GROUND_H-diff.gap-60;
      pipes.push({x:W+10,top:Math.random()*(maxTop-minTop)+minTop,passed:false});
      lastPipeTime=ts;
    }
    pipes.forEach(p=>{
      p.x-=diff.speed;
      if(!p.passed&&p.x+PIPE_W<bird.x){
        p.passed=true; score++; scoreEl.textContent=score; playSound('score');
        if(score>best){ best=score; bestEl.textContent=best; localStorage.setItem('flapsy_shei_best',best); }
      }
    });
    pipes=pipes.filter(p=>p.x+PIPE_W>-20);
    bird.vy+=diff.gravity; bird.y+=bird.vy;
    bird.angle=Math.min(Math.PI/4,Math.max(-Math.PI/4,bird.vy*.07));
    bird.flapTimer++; if(bird.flapTimer%8===0) bird.wingState=(bird.wingState+1)%3;
    if(checkCollision()){
      playSound('hit'); setTimeout(()=>playSound('die'),80);
      spawnParticles(bird.x+bird.w/2,bird.y+bird.h/2);
      const isNewBest=score>=best&&score>0;
      saveScore(score,diff.id);
      state='dead'; deathScreen.style.display=''; startScreen.style.display='none';
      finalScoreEl.textContent=score; finalBestEl.textContent=best;
      newBestMsg.style.display=isNewBest?'':'none';
      medalEl.textContent=score>=40?'🏆':score>=20?'🥇':score>=10?'🥈':score>=5?'🥉':'💀';
      renderLeaderboard('death-lb');
    }
  }
  pipes.forEach(p=>drawPipe(p,theme));
  drawGround(theme); updateParticles(); drawBird(bird);
  if(state==='playing') drawScore();
  if(state==='start') drawIdleHint();
  if(state==='start'){
    bird.y=H/2-30+Math.sin(ts/400)*8; bird.angle=Math.sin(ts/400)*.15;
    bird.flapTimer++; if(bird.flapTimer%10===0) bird.wingState=(bird.wingState+1)%3;
  }
  requestAnimationFrame(loop);
}

function flap(){
  if(state==='start'){
    state='playing'; startScreen.style.display='none'; deathScreen.style.display='none';
    lastPipeTime=performance.now()+800; bird.vy=getDiff().jump; playSound('flap'); return;
  }
  if(state==='dead'){
    reset(); state='playing'; deathScreen.style.display='none';
    lastPipeTime=performance.now()+800; bird.vy=getDiff().jump; playSound('flap'); return;
  }
  if(state==='playing'){ bird.vy=getDiff().jump; bird.wingState=1; playSound('flap'); }
}

canvas.addEventListener('click',flap);
canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap();}});

// Boot
buildSkinGrid(); buildDiffBtns(); buildThemeGrid(); renderLeaderboard('lb-list');
reset(); requestAnimationFrame(loop);
</script>
